<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Meme Simon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <select id="langSelect"></select>
  <button id="modeBtn">🌙</button>
</div>

<div class="card">
  <h1>🤖 Meme Simon</h1>
  <p class="subtitle">Emoji AI • Multilingual • Fun</p>

  <div class="status">
    <span id="level">Level: 0</span>
  </div>

  <div class="grid">
    <div class="pad" data-id="0">🐸</div>
    <div class="pad" data-id="1">🐵</div>
    <div class="pad" data-id="2">🐶</div>
    <div class="pad" data-id="3">🐱</div>
  </div>

  <div class="ai-box" id="aiText">
    Pick a language & start 😄
  </div>

  <button id="startBtn">Start Game</button>
</div>

<script src="app.js"></script>
</body>
</html>
